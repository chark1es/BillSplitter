# Dokploy persists environment variables to a `.env` file alongside this compose file.
# `env_file` loads every key from that file into the container (no per-variable list).
# For local runs: `cp .env.example .env` and fill values.
#
# Build-time: `VITE_*` are baked into the client bundle via Dockerfile ARGs;
# substitution uses the same `.env` when you `docker compose build`.

services:
  web:
    build:
      context: .
      args:
        VITE_APP_URL: ${VITE_APP_URL}
        VITE_CONVEX_URL: ${VITE_CONVEX_URL}
        VITE_CONVEX_SITE_URL: ${VITE_CONVEX_SITE_URL}
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT: ${PORT:-3000}
      APP_PUBLIC_URL: ${APP_PUBLIC_URL}
      VITE_APP_URL: ${VITE_APP_URL}
      VITE_CONVEX_URL: ${VITE_CONVEX_URL}
      VITE_CONVEX_SITE_URL: ${VITE_CONVEX_SITE_URL}
      CONVEX_URL: ${CONVEX_URL:-}
      CONVEX_SITE_URL: ${CONVEX_SITE_URL:-}
      BETTER_AUTH_URL: ${BETTER_AUTH_URL}
      BETTER_AUTH_TRUSTED_ORIGINS: ${BETTER_AUTH_TRUSTED_ORIGINS:-}
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      TEST_AUTH_BYPASS: ${TEST_AUTH_BYPASS:-false}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      RESEND_FROM: ${RESEND_FROM:-}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      RECEIPT_MODEL_ID: ${RECEIPT_MODEL_ID:-}
      UPLOADTHING_TOKEN: ${UPLOADTHING_TOKEN:-}
    expose:
      - "3000"
